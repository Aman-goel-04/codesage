name: codesage

services:
  postgres:
    image: postgres:16
    container_name: codesage-pg

    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: MagnusCarlsen@5679@IanNepomniachtchi
      POSTGRES_DB: codesage

    volumes:
      - db_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data: